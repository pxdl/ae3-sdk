name: core
on:
  push:
    paths: ["core/**", "harness/**", "tests/**", "Makefile", ".github/workflows/ci-core.yml"]
  pull_request:
    paths: ["core/**", "harness/**", "tests/**", "Makefile", ".github/workflows/ci-core.yml"]
  workflow_dispatch:

jobs:
  build-and-vectors:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build core + wavdump, render golden vectors
        run: python3 tests/run_vectors.py
